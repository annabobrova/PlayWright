name: Playwright Python Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Use your preferred version
        cache: 'pip' # Caches your requirements for faster runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest-playwright
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install Playwright Browser (Chromium Only)
      run: playwright install chromium --with-deps

    - name: Run Playwright tests
      # Added the --headless flag
      run: pytest tests/UItests --browser chromium --headless=true --junitxml=results.xml

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: results.xml
